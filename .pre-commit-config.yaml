repos:
  - repo: local
    hooks:
      - id: ty-check
        name: ty check
        entry: uv run ty check
        language: system
        pass_filenames: false
        always_run: true
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        pass_filenames: false
        always_run: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check
        language: system
        pass_filenames: false
        always_run: true
      - id: tryke-test
        name: tryke test
        entry: uv run tryke test
        language: system
        pass_filenames: false
        always_run: true
